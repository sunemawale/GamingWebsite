{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Register</title>
    <link rel="stylesheet" href="{% static 'store/css/style.css' %}">
</head>
<body class="auth-body">

<!-- Back Button -->
<a href="{% url 'home' %}" class="back-home-top">← Home</a>

<div class="auth-container">
    <h2>Create Account</h2>
    {% if messages %}
        <div class="messages">
            {% for message in messages %}
                <p class="{{ message.tags }}">{{ message }}</p>
            {% endfor %}
        </div>
    {% endif %}
    <form method="POST" class="auth-form">
        {% csrf_token %}

        <input type="text" name="username" placeholder="Username" required class="input-field">
        <input type="email" name="email" placeholder="Email" required class="input-field">
        <input type="password" name="password" placeholder="Password" required class="input-field">
        <input type="password" name="confirm_password" placeholder="Confirm Password" required class="input-field">

        <button type="submit">Register</button>
    </form>

    <p class="auth-link">
        Already have an account?
        <a href="{% url 'login' %}">Login</a>
    </p>
</div>

</body>
</html>
